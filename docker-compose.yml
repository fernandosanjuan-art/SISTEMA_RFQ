version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: rfq_db
      MYSQL_USER: rfq_user
      MYSQL_PASSWORD: rfq_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql://rfq_user:rfq_pass@mysql:3306/rfq_db
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - mysql
      - redis

  celery_worker:
    build: .
    command: celery -A config_rfq worker --concurrency=1 --max-tasks-per-child=50 --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mysql://rfq_user:rfq_pass@mysql:3306/rfq_db
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data: